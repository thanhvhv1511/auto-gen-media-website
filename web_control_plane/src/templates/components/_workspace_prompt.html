<div class="row g-4 h-100" style="min-height: 75vh;">

    <div class="col-md-3 d-flex flex-column">
        <div class="card h-100 flex-grow-1">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-folder-fill text-warning me-2"></i> Concepts</span>
                <button class="btn btn-sm btn-primary py-1 px-3 tech-font" onclick="addNewConcept()"><i class="bi bi-plus-lg"></i> Thêm</button>
            </div>
            <div class="card-body p-2" style="overflow-y: auto;">
                <div class="d-flex flex-column gap-2" id="conceptSidebarList">
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-9 d-flex flex-column">
        <div class="card h-100 flex-grow-1">

            <div class="card-header d-flex align-items-center justify-content-between gap-3">
                <h5 class="mb-0 text-info fw-bold" id="activeConceptTitle">Chưa chọn Concept</h5>
                <span class="badge bg-success tech-font d-none" id="conceptSavedBadge"><i class="bi bi-check-circle"></i> Đã đồng bộ DB</span>
            </div>

            <div class="card-body p-4 flex-grow-1" style="overflow-y: auto;">
                <div class="mb-4 p-3 rounded border border-secondary" style="background: rgba(0,0,0,0.15);">
                    <label class="form-label small text-info fw-bold mb-3 d-block">
                        <i class="bi bi-magic text-warning"></i> Thanh công cụ chèn biến (Nhấp chuột vào ô nhập trước, sau đó bấm nút):
                    </label>

                    <div class="d-flex flex-wrap gap-2" id="promptVariableToolbar">
                        <span class="text-muted small spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        <span class="text-muted small ms-2">Đang tải công cụ từ Database...</span>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label text-warning"><i class="bi bi-image"></i> Prompt Bản Lề (Hình Ảnh)</label>
                        <textarea class="form-control tech-font p-3 prompt-editor" id="conceptBasePromptImage"
                            rows="16" style="line-height: 1.6;"
                            placeholder="Soạn prompt sinh ảnh tại đây..."></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-purple"><i class="bi bi-film"></i> Prompt Bản Lề (Video)</label>
                        <textarea class="form-control tech-font p-3 border-purple prompt-editor"
                            id="conceptBasePromptVideo" rows="16"
                            style="line-height: 1.6; border-color: rgba(168, 85, 247, 0.4);"
                            placeholder="Soạn prompt sinh video tại đây..."></textarea>
                    </div>
                </div>
                
                <div class="mt-4 text-end">
                    <button class="btn btn-primary px-4 tech-font shadow-glow" onclick="saveBasePrompt()">
                        <i class="bi bi-save"></i> Lưu Base Prompts
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
