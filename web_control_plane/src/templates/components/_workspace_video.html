<div class="tab-pane fade show active" id="video-pane" role="tabpanel" tabindex="0">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-rocket-takeoff text-accent me-2"></i> Trạm Khởi Chạy Video</span>
                    <button class="btn btn-sm btn-outline-primary tech-font" onclick="openTimelineBuilder()">
                        <i class="bi bi-sliders"></i> Tùy Chỉnh Kịch Bản
                    </button>
                </div>
                <div class="card-body">
                    <form id="videoJobForm">
                        <div class="mb-4">
                            <label class="form-label text-info">1. Chọn Nguồn Dữ Liệu (Source)</label>
                            <select class="form-select tech-font border-info" id="vidSmartSelector" onchange="loadProductContext()">
                                <option value="">-- Đang tải dữ liệu sản phẩm... --</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">2. Thuộc Tính Tự Động (Feature Flags)</label>
                            <div class="p-3 rounded" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle);" id="featureFlagsContainer">
                                <p class="text-muted small mb-0 fst-italic">Vui lòng chọn sản phẩm để hiển thị thuộc tính...</p>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between align-items-center">
                                <span>3. Live Prompt Preview</span>
                                <span class="badge bg-success bg-opacity-25 text-success">Auto-sync</span>
                            </label>
                            <textarea class="form-control tech-font text-muted" id="vidLivePrompt" rows="5" readonly style="background: #000; border-color: #333; font-size: 0.8rem;">Đang chờ dữ liệu...</textarea>
                        </div>

                        <div class="mb-4 d-none">
                            <textarea class="form-control" id="vidCustomPrompt"></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2" id="submitVideoBtn" disabled>
                            <i class="bi bi-lightning-charge-fill me-1"></i> Bắt Đầu Render Lô Video
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-camera-reels text-secondary me-2"></i> Hàng Đợi & Lịch Sử Render</div>
                    <span class="tech-font text-muted" style="font-size: 0.8rem;">Sync: 3s</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-borderless mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Task ID</th>
                                    <th>Target</th>
                                    <th>Config</th>
                                    <th>State</th>
                                    <th>Timestamp</th>
                                    <th class="text-end pe-4">Action</th>
                                </tr>
                            </thead>
                            <tbody id="videoTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
