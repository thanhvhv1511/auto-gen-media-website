<div class="row g-4 h-100" style="min-height: 75vh;">
    <div class="col-12">
        <div class="card shadow-lg border-0 h-100" style="background-color: #1a1d21;"> 
            
            <div class="card-header d-flex justify-content-between align-items-center py-3 border-0" 
                 style="background: linear-gradient(180deg, #2b3035 0%, #212529 100%); border-bottom: 2px solid #0d6efd !important;">
                
                <h5 class="mb-0 fw-bold text-white" style="letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
                    <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i> Ma Trận Bối Cảnh & Concepts
                </h5>
                
                <button class="btn btn-primary btn-sm px-3 fw-semibold shadow-sm" style="border-radius: 6px;" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-1"></i> Thêm Background
                </button>
            </div>
            
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-dark matrix-table align-middle mb-0">
                        <thead id="backgroundTableHeader">
                            </thead>
                        <tbody id="backgroundTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
