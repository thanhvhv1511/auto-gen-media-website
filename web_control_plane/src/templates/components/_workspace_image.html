<div class="tab-pane fade show active" id="image-pane" role="tabpanel" tabindex="0">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-magic text-secondary me-2"></i> Khởi Tạo Tiến Trình Ảnh</div>
                <div class="card-body">
                    <form id="jobForm">
                        <div class="mb-4">
                            <label class="form-label text-light fw-bold"><i class="bi bi-tag-fill text-warning me-1"></i> Chọn Sản Phẩm</label>
                            <select class="form-select tech-font" id="productId" required>
                                <option value="">-- Chọn sản phẩm xử lý --</option>
                                </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light fw-bold"><i class="bi bi-sliders me-1"></i> Concept Pipeline</label>
                            <select class="form-select tech-font" id="conceptId" required>
                                <option value="">-- Chọn Concept Mẫu --</option>
                                </select>
                        </div>

                        <div class="mb-5">
                            <label class="form-label text-muted small fw-bold">Ảnh (INPUT)</label>
                            <input class="form-control text-muted" type="file" id="imageFile" accept="image/*" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light fw-bold"><i class="bi bi-arrow-repeat text-info me-1"></i> LOOP COUNT</label>
                            <input type="number" class="form-control tech-font text-muted" id="loopCount" min="1" max="40" value="10" required>
                            <div class="form-text text-secondary small" style="font-size: 0.75rem;">Số lượng biến thể ảnh muốn tạo ra từ luồng này.</div>
                        </div>
                                                
                        <button type="submit" class="btn btn-primary w-100 shadow-glow tech-font" id="submitBtn">
                            <i class="bi bi-rocket-takeoff-fill"></i> Đẩy Lệnh Vào Hàng Đợi
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-activity text-secondary me-2"></i> Pipeline Sinh Ảnh</div>
                    <span class="tech-font text-muted" style="font-size: 0.8rem;">Sync: 3s</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-borderless mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Task ID</th>
                                    <th>Target Code</th>
                                    <th>State</th>
                                    <th>Timestamp</th>
                                    <th class="text-end pe-4">Action</th>
                                </tr>
                            </thead>
                            <tbody id="imageTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
